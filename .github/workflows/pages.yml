name: Benchmark Report Pages

on:
  push:
    branches: [main]
    paths:
      - 'results/*.json'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp results/classification.json _site/
          cp results/reasoning.json _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
