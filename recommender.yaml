defaultTest:
  options:
    transform: '(output=>{const s=typeof output==="string"?output:output?.content??JSON.stringify(output);return s.replace(/<think>[\s\S]*?<\/think>/g,"").replace(/^```(?:json)?\s*/m,"").replace(/\s*```\s*$/m,"").trim()})(output)'
  assert:
    - type: javascript
      description: "output contains at least 2 === block separators (3+ blocks)"
      value: "(output.match(/^===\s*$/m) || []).length >= 2"

    - type: javascript
      description: "first block is a hero block"
      value: "(s => { const first = s.split(/^===\s*$/m)[0].trim(); try { return JSON.parse(first).block === 'hero'; } catch(e) { return false; } })(output)"

    - type: javascript
      description: "output contains a comparison-table block (critical rule 3)"
      value: "output.includes('\"block\":\"comparison-table\"') || output.includes('\"block\": \"comparison-table\"')"

    - type: javascript
      description: "suggestions are present at the end"
      value: "output.includes('\"suggestions\"')"

    - type: javascript
      description: "no forbidden 'buy' suggestion type"
      value: '!/"type"\s*:\s*"buy"/.test(output)'

    - type: javascript
      description: "suggestion types are only explore or compare"
      value: |
        (s => {
          const sugg = s.match(/"suggestions"\s*:\s*(\[[\s\S]*?\])/);
          if (!sugg) return true;
          const suggTypes = (sugg[1].match(/"type"\s*:\s*"([^"]+)"/g) || []).map(t => t.match(/"type"\s*:\s*"([^"]+)"/)[1]);
          return suggTypes.every(t => t === 'explore' || t === 'compare');
        })(output)

    - type: javascript
      description: "hero block contains an image token"
      value: |
        (s => {
          const first = s.split(/^===\s*$/m)[0].trim();
          return first.includes('product-image:') || first.includes('hero-image:');
        })(output)

    - type: javascript
      description: "all product hrefs use real catalog paths (no invented URLs)"
      value: |
        (s => {
          const hrefs = (s.match(/"href"\s*:\s*"([^"]+)"/g) || []).map(h => h.match(/"href"\s*:\s*"([^"]+)"/)[1]);
          const productHrefs = hrefs.filter(h => h.startsWith('/products/'));
          const validPrefixes = ['/products/espresso-machines/', '/products/grinders/'];
          return productHrefs.every(h => validPrefixes.some(p => h.startsWith(p)));
        })(output)

tests:
  - description: "cold-start: new visitor, no history"
    vars:
      query: "show me all your espresso machines"
      scenario_prefix: |
        New visitor with no browsing history. Generate a discovery page.
        This customer has no browsing history, so introduce them to the Arco range. Use {{hero-image:main}}.
      rag_products: ""
      rag_guides: ""
      rag_reviews: ""
      intent_type: "product-discovery"
    assert:
      - type: javascript
        description: "cold start uses hero-image:main (no specific product assumed)"
        value: "output.split(/^===\\s*$/m)[0].includes('hero-image:main')"

  - description: "beginner: switching from Nespresso"
    vars:
      query: "switching from Nespresso, what Arco machine should I get?"
      scenario_prefix: |
        New visitor with no browsing history. Generate a discovery page for a beginner.
        This customer is switching from a pod/capsule machine. Be empathetic and welcoming.
      rag_products: |
        ## Recommended Products (from RAG)
        - Primo (primo) | $899 | home-barista, beginner, espresso
        - Nano (nano) | $649 | beginner, travel, espresso
        - Automatico (automatico) | $1899 | beginner, office, milk-drinks
      rag_guides: ""
      rag_reviews: ""
      intent_type: "beginner"
    assert:
      - type: javascript
        description: "recommends a beginner-friendly machine (primo, nano, or automatico)"
        value: "/(primo|nano|automatico)/i.test(output)"

  - description: "beginner: never made espresso before"
    vars:
      query: "I've never made espresso before, where do I start?"
      scenario_prefix: |
        New visitor with no browsing history. Generate a welcoming beginner discovery page.
      rag_products: |
        ## Recommended Products (from RAG)
        - Primo (primo) | $899 | home-barista, beginner, espresso
        - Nano (nano) | $649 | beginner, travel, espresso
        - Viaggio (viaggio) | $399 | travel, beginner, espresso
      rag_guides: ""
      rag_reviews: ""
      intent_type: "beginner"

  - description: "comparison: primo vs doppio"
    vars:
      query: "primo vs doppio which is better for a home barista?"
      scenario_prefix: |
        New visitor explicitly requesting a comparison. Focus entirely on their comparison request.
        Start with a hero using product-image:primo or product-image:doppio.
        Include a comparison-table for Primo vs Doppio specifically.
      rag_products: |
        ## Recommended Products (from RAG)
        - Primo (primo) | $899 | home-barista, espresso, beginner
        - Doppio (doppio) | $1599 | home-barista, milk-drinks, espresso
      rag_guides: ""
      rag_reviews: ""
      intent_type: "comparison"
    assert:
      - type: javascript
        description: "mentions both primo and doppio"
        value: "/primo/i.test(output) && /doppio/i.test(output)"

  - description: "comparison: studio vs studio-pro"
    vars:
      query: "what's the difference between the studio and studio-pro?"
      scenario_prefix: |
        New visitor explicitly requesting a comparison between Studio and Studio Pro.
        Include a comparison-table for Studio vs Studio Pro specifically.
      rag_products: |
        ## Recommended Products (from RAG)
        - Studio (studio) | $2299 | home-barista, espresso, upgrade
        - Studio Pro (studio-pro) | $3499 | home-barista, espresso, upgrade
      rag_guides: ""
      rag_reviews: ""
      intent_type: "comparison"
    assert:
      - type: javascript
        description: "mentions both studio models"
        value: "/studio/i.test(output)"

  - description: "product-detail: ufficio deep-dive"
    vars:
      query: "tell me everything about the ufficio"
      scenario_prefix: |
        Generate a personalized recommendation page focused on the Ufficio.
        Start with a hero using product-image:ufficio.
      rag_products: |
        ## Recommended Products (from RAG)
        - Ufficio (ufficio) | $4299 | office, espresso, milk-drinks
        - Studio Pro (studio-pro) | $3499 | home-barista, espresso, upgrade
        - Studio (studio) | $2299 | home-barista, espresso, upgrade
      rag_guides: ""
      rag_reviews: ""
      intent_type: "product-detail"
    assert:
      - type: javascript
        description: "mentions ufficio"
        value: "/ufficio/i.test(output)"

  - description: "use-case: home office multiple users"
    vars:
      query: "best machine for a busy home office with multiple users"
      scenario_prefix: |
        Generate a personalized recommendation page for a home office use case.
      rag_products: |
        ## Recommended Products (from RAG)
        - Ufficio (ufficio) | $4299 | office, espresso, milk-drinks
        - Automatico (automatico) | $1899 | beginner, office, milk-drinks
        - Doppio (doppio) | $1599 | home-barista, milk-drinks, espresso
      rag_guides: ""
      rag_reviews: ""
      intent_type: "espresso"

  - description: "specs: studio pro boiler and pressure"
    vars:
      query: "what is the boiler size and pressure rating of the studio pro?"
      scenario_prefix: |
        Generate a recommendation page focused on Studio Pro specs.
        Start with a hero using product-image:studio-pro.
      rag_products: |
        ## Recommended Products (from RAG)
        - Studio Pro (studio-pro) | $3499 | home-barista, espresso, upgrade
        - Studio (studio) | $2299 | home-barista, espresso, upgrade
        - Doppio (doppio) | $1599 | home-barista, milk-drinks, espresso
      rag_guides: ""
      rag_reviews: ""
      intent_type: "espresso"
    assert:
      - type: javascript
        description: "mentions studio-pro"
        value: "/studio.pro|studio pro/i.test(output)"

  - description: "reviews: nano customer opinions"
    vars:
      query: "what do customers say about the nano?"
      scenario_prefix: |
        Generate a recommendation page featuring customer reviews of the Nano.
      rag_products: |
        ## Recommended Products (from RAG)
        - Nano (nano) | $649 | beginner, travel, espresso
        - Primo (primo) | $899 | home-barista, beginner, espresso
      rag_guides: ""
      rag_reviews: |
        ## Reviews (use {{review:ID}} tokens)
        - ID: rev-nano-001 | Customer: "The Nano fits perfectly on my small counter and pulls great shots."
        - ID: rev-nano-002 | Customer: "Heats up in 3 minutes — perfect for busy mornings."
      intent_type: "espresso"
    assert:
      - type: javascript
        description: "mentions nano"
        value: "/nano/i.test(output)"

  - description: "price: student budget"
    vars:
      query: "I'm a student, what's the most affordable Arco espresso machine?"
      scenario_prefix: |
        Generate a budget-focused recommendation page. The customer is price-sensitive.
        Use the Budget / Price Query scenario structure.
      rag_products: |
        ## Recommended Products (from RAG)
        - Viaggio (viaggio) | $399 | travel, beginner, espresso
        - Nano (nano) | $649 | beginner, travel, espresso
        - Primo (primo) | $899 | home-barista, beginner, espresso
      rag_guides: ""
      rag_reviews: ""
      intent_type: "budget"
    assert:
      - type: javascript
        description: "mentions the most affordable options (viaggio or nano)"
        value: "/(viaggio|nano)/i.test(output)"

  - description: "recommendation: experienced barista"
    vars:
      query: "I'm an experienced barista who dials in single origin, what should I get?"
      scenario_prefix: |
        Generate a personalized recommendation for an experienced home barista.
        They want precision control. Highlight flow control and pressure profiling features.
      rag_products: |
        ## Recommended Products (from RAG)
        - Studio Pro (studio-pro) | $3499 | home-barista, espresso, upgrade
        - Studio (studio) | $2299 | home-barista, espresso, upgrade
        - Macinino Pro (macinino-pro) | $799 | espresso, home-barista, precision
      rag_guides: ""
      rag_reviews: ""
      intent_type: "espresso"
    assert:
      - type: javascript
        description: "recommends a prosumer machine (studio or studio-pro)"
        value: "/studio/i.test(output)"

  - description: "support: machine tripping circuit breaker"
    vars:
      query: "my primo keeps tripping the circuit breaker, help"
      scenario_prefix: |
        Generate a support-focused recommendation page. The customer has a product problem.
        Use the Support / Problem Query scenario. Be empathetic and helpful.
      rag_products: |
        ## Recommended Products (from RAG)
        - Primo (primo) | $899 | home-barista, beginner, espresso
      rag_guides: ""
      rag_reviews: ""
      intent_type: "support"
    assert:
      - type: javascript
        description: "mentions primo"
        value: "/primo/i.test(output)"

  - description: "gift: birthday present for coffee lover"
    vars:
      query: "best espresso machine as a birthday gift for a coffee lover"
      scenario_prefix: |
        Generate a gift-focused recommendation page. The customer is buying for someone else.
        Focus on popular, well-rounded machines that make great gifts.
      rag_products: |
        ## Recommended Products (from RAG)
        - Primo (primo) | $899 | home-barista, beginner, espresso
        - Doppio (doppio) | $1599 | home-barista, milk-drinks, espresso
        - Automatico (automatico) | $1899 | beginner, office, milk-drinks
      rag_guides: ""
      rag_reviews: ""
      intent_type: "gift"

  - description: "upgrade: from primo to next level"
    vars:
      query: "I have the primo and want to upgrade, what should I consider?"
      scenario_prefix: |
        Generate a personalized recommendation page for a Primo owner looking to upgrade.
        Profile: skill-level intermediate, viewed products: primo, doppio.
        Budget range: $1500-$2500 (from viewed products).

        ## Customer Profile (from browsing behavior)
        - Viewed products: primo, doppio
        - Price sensitivity: mid tier
        - Skill level: intermediate
      rag_products: |
        ## Recommended Products (from RAG)
        - Doppio (doppio) | $1599 | home-barista, milk-drinks, espresso
        - Studio (studio) | $2299 | home-barista, espresso, upgrade
        - Macinino (macinino) | $549 | espresso, home-barista, upgrade
