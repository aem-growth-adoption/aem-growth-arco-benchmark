      rag_reviews: ""
      intent_type: "upgrade"
    assert:
      - type: javascript
        description: "recommends an upgrade over primo (doppio or studio)"
        value: "/(doppio|studio)/i.test(output)"

  - description: "technique: milk steaming for latte art"
    vars:
      query: "how do I steam milk properly for latte art?"
